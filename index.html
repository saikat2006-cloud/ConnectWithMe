<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="wrap">

    <div class="hero">
      <p class="hero-eyebrow">Get in touch</p>
      <h1>Say Hello</h1>
      <p class="hero-sub">Fill in your details and we'll keep in touch.</p>
    </div>

    <div class="toast success" id="toast-success">Entry saved successfully!</div>
    <div class="toast error"   id="toast-error">Something went wrong. Please try again.</div>

    <div class="card">
      <div class="field">
        <label for="name">Full name</label>
        <input type="text"  id="name"  placeholder="Jane Doe"/>
        <p class="err-msg"  id="name-err">Please enter your name.</p>
      </div>
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="jane@example.com"/>
        <p class="err-msg"  id="email-err">Please enter a valid email.</p>
      </div>
      <div class="field">
        <label for="phone">Phone number</label>
        <input type="tel"   id="phone" placeholder="+1 (555) 000-0000"/>
        <p class="err-msg"  id="phone-err">Please enter a phone number.</p>
      </div>
      <div class="divider"></div>
      <button class="submit-btn" id="submit-btn" onclick="submitForm()">Submit</button>
    </div>

    <div class="db-section">
      <div class="db-header">
        <span class="db-title">Submissions</span>
        <span class="db-count" id="count">— entries</span>
      </div>
      <div id="entries">
        <div class="empty-state">Connecting to database…</div>
      </div>
    </div>

  </div>

  <!-- Firebase SDKs (compat mode, v10) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
